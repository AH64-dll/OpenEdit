<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PyAgent — Kdenlive Chat</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">PyAgent</div>
    <div class="agent-picker">
      <label class="picker-label" for="agent-select">Agent</label>
      <select id="agent-select" class="agent-select" title="Choose agent backend"></select>
      <select id="model-select" class="agent-select" title="Choose model"></select>
    </div>
    <div class="project-container">
      <div class="project" id="project-path" title="Active project file">—</div>
      <button id="change-project-btn" class="ghost-btn" title="Change active project file">✏️</button>
    </div>
    <button id="state-refresh" class="ghost-btn" title="Refresh project state">↻</button>
  </header>

  <div id="reload-banner" class="reload-banner" style="display: none;">
    <span>⚠ Your edits are saved — reload Kdenlive (Ctrl+Shift+R) to see them.</span>
    <button id="reload-done" class="reload-done-btn">I reloaded</button>
  </div>

  <main class="layout">
    <aside class="sessions-col">
      <div class="sidebar-header">
        <h2>Sessions</h2>
        <button id="new-session-btn" class="ghost-btn" title="New Session">+</button>
      </div>
      <div id="sessions-list" class="sessions-list">
        <!-- Rendered dynamically -->
      </div>
    </aside>

    <section class="chat-col">
      <div id="transcript" class="transcript" aria-live="polite"></div>

      <div id="plan-slot"></div>

      <form id="composer" class="composer">
        <div class="composer-container">
          <div id="image-previews" class="image-previews"></div>
          <textarea id="prompt-input" rows="2"
            placeholder="Tell PyAgent what to do… (Enter to send, Shift+Enter for newline)"></textarea>
        </div>
        <div class="composer-actions">
          <button type="submit" id="send-btn">Send</button>
          <button type="button" id="stop-btn" style="display: none;">Stop</button>
        </div>
      </form>
      <div id="quick-actions" class="quick-actions"></div>
    </section>

    <aside class="state-col">
      <h2>Project State</h2>
      <div id="state-panel" class="state-panel">
        <p class="muted">Loading…</p>
      </div>
    </aside>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
